    }

      margin: 0;
    }

      right: 12px;
      top: 36px;

    .action-btn {

      border: none;

      font-size: 14px;

      gap: 14px;
    }

      border-radius: 14px;
      overflow: hidden;
      position: relative;
      padding: 12px 10px;

let maxPrice = Infinity;

function formatNumber(num) {
  return num ? num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") : '';
}

function unformatNumber(str) {
  return parseInt(str.replace(/\s/g, '')) || 0;
}

// Форматирование ввода
[minPriceInput, maxPriceInput].forEach(input => {
  input.addEventListener('input', e => {
    let val = unformatNumber(e.target.value);
    if (!isNaN(val)) {
      e.target.value = formatNumber(val);
    }
  });
  input.addEventListener('focus', e => {
    e.target.value = unformatNumber(e.target.value);
  });
  input.addEventListener('blur', e => {
    let val = unformatNumber(e.target.value);
    e.target.value = val > 0 ? formatNumber(val) : '';
  });
});

// Валидация
function validateInputs() {
  let minV = unformatNumber(minPriceInput.value);
  let maxV = unformatNumber(maxPriceInput.value);
  const invalid = minV > maxV && maxV > 0;
  minPriceInput.classList.toggle('invalid', invalid);
  maxPriceInput.classList.toggle('invalid', invalid);
}
[minPriceInput, maxPriceInput].forEach(inp => inp.addEventListener('input', validateInputs));

function applyPriceFilter() {
  let minVal = unformatNumber(minPriceInput.value);
  let maxVal = unformatNumber(maxPriceInput.value);
  if (minVal > maxVal && maxVal > 0) [minVal, maxVal] = [maxVal, minVal];
  minPrice = minVal;
  maxPrice = maxVal > 0 ? maxVal : Infinity;
  updateProducts();
  updateFilterButtonText();
  filterMenu.style.display = 'none';
}

applyRangeBtn.onclick = applyPriceFilter;

resetRangeBtn.onclick = () => {
  minPrice = 0;
  maxPrice = Infinity;
  minPriceInput.value = '';
  maxPriceInput.value = '';
  updateProducts();
  updateFilterButtonText();
  filterMenu.style.display = 'none';
};

document.querySelectorAll('.quick-item').forEach(el => {
  el.onclick = () => {
    minPrice = Number(el.dataset.min);
    maxPrice = Number(el.dataset.max);
    minPriceInput.value = minPrice === 0 ? '' : formatNumber(minPrice);
    maxPriceInput.value = maxPrice >= 999999 ? '' : formatNumber(maxPrice);
    updateProducts();
    updateFilterButtonText();
    filterMenu.style.display = 'none';
  };
});

function updateFilterButtonText() {
  let text = "Фильтр";
  let active = false;
  if (minPrice > 0 || (maxPrice !== Infinity && maxPrice < 9999999)) {
    active = true;
    let from = minPrice > 0 ? formatNumber(minPrice) : '';
    let to = maxPrice !== Infinity ? formatNumber(maxPrice) : '';
    if (from && to) text = `${from} – ${to} ₽`;
    else if (from) text = `от ${from} ₽`;
    else if (to) text = `до ${to} ₽`;
  }
  filterBtn.textContent = text;
  filterBtn.classList.toggle('active', active);
}

function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(fid => fid !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  updateProducts();
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'product-card';
  const isFav = favorites.includes(item.id);
  card.innerHTML = `
    <div class="favorite ${isFav ? 'active' : ''}" data-id="${item.id}">${isFav ? '♥' : '♡'}</div>
    <img src="static/images/${item.image}" alt="${item.name}" loading="lazy">
    <div class="product-name">${item.name}</div>
    <div class="price-block">
      <div class="current-price">${item.price.toLocaleString('ru-RU')} ₽</div>
      ${item.oldPrice ? `<div class="old-price">${item.oldPrice.toLocaleString('ru-RU')} ₽</div>` : '<div style="visibility:hidden;"> </div>'}
    </div>
  `;

  card.addEventListener('click', e => {
    if (e.target.closest('.favorite')) return;
    window.location.href = `knife.html?id=${item.id}`;
  });

  const favIcon = card.querySelector('.favorite');
  favIcon.addEventListener('click', e => {
    e.stopPropagation();
    toggleFavorite(item.id);
    const nowFav = favorites.includes(item.id);
    favIcon.textContent = nowFav ? '♥' : '♡';
    favIcon.classList.toggle('active', nowFav);
  });

  return card;
}

function updateProducts() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = category.items.filter(p =>
    p.name.toLowerCase().includes(query) &&
    p.price >= minPrice &&
    (maxPrice === Infinity || p.price <= maxPrice)
  );
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  filtered.forEach(item => grid.appendChild(createCard(item)));
}

// Фильтр меню
filterBtn.onclick = () => {
  const isVisible = filterMenu.style.display === 'block';
  filterMenu.style.display = isVisible ? 'none' : 'block';
  if (!isVisible) {
    minPriceInput.value = minPrice > 0 ? formatNumber(minPrice) : '';
    maxPriceInput.value = maxPrice !== Infinity ? formatNumber(maxPrice) : '';
    validateInputs();
  }
};

document.addEventListener('click', e => {
  if (!filterBtn.contains(e.target) && !filterMenu.contains(e.target)) {
    filterMenu.style.display = 'none';
  }
});

[maxPriceInput, minPriceInput].forEach(inp => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') applyPriceFilter();
  });
});

searchInput.addEventListener('input', updateProducts);

homeNav.onclick = () => window.location.href = 'index.html';
catalogNav.onclick = () => window.location.href = 'katalog.html';
favNav.onclick = () => window.location.href = 'index.html#favoritesSection';
cartNav.onclick = () => window.location.href = 'cart.html';

// Инициализация
updateProducts();
updateFilterButtonText();
</script>
</body>
</html>
